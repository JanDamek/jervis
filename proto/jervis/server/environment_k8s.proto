syntax = "proto3";

package jervis.server;

import "jervis/common/types.proto";

option java_package = "com.jervis.contracts.server";
option java_multiple_files = true;
option java_outer_classname = "ServerEnvironmentK8sProto";

// ServerEnvironmentK8sService exposes per-namespace Kubernetes inspection
// ops (pods, deployments, logs, scale/restart) used by the MCP server's
// K8s tools. The EnvironmentResourceService already owns the allow-list
// guard; pod logs are a plain text passthrough so the response stays a
// string field.
service ServerEnvironmentK8sService {
  rpc ListNamespaceResources(ListNamespaceResourcesRequest) returns (ListNamespaceResourcesResponse);
  rpc GetPodLogs(GetPodLogsRequest) returns (GetPodLogsResponse);
  rpc GetDeploymentStatus(GetDeploymentStatusRequest) returns (GetDeploymentStatusResponse);
  rpc ScaleDeployment(ScaleDeploymentRequest) returns (ScaleDeploymentResponse);
  rpc RestartDeployment(RestartDeploymentRequest) returns (RestartDeploymentResponse);
  rpc GetNamespaceStatus(GetNamespaceStatusRequest) returns (GetNamespaceStatusResponse);
}

// ── ListNamespaceResources ──────────────────────────────────────────────

message ListNamespaceResourcesRequest {
  jervis.common.RequestContext ctx = 1;
  string namespace = 2;
  string type = 3;                 // "all" / "pods" / "deployments" / "services" / "secrets"
}

message ListNamespaceResourcesResponse {
  bool ok = 1;
  string error = 2;                // populated on 403/500
  K8sResourceList data = 3;        // resources grouped by type
}

message K8sResourceList {
  repeated K8sPod pods = 1;
  repeated K8sDeployment deployments = 2;
  repeated K8sService services = 3;
}

message K8sPod {
  string name = 1;
  string phase = 2;                // empty = unset
  bool ready = 3;
  int32 restart_count = 4;
  string created_at = 5;
}

message K8sDeployment {
  string name = 1;
  int32 replicas = 2;
  int32 available_replicas = 3;
  bool ready = 4;
  string image = 5;
  string created_at = 6;
}

message K8sService {
  string name = 1;
  string type = 2;
  string cluster_ip = 3;
  repeated string ports = 4;
  string created_at = 5;
}

// ── GetPodLogs ──────────────────────────────────────────────────────────

message GetPodLogsRequest {
  jervis.common.RequestContext ctx = 1;
  string namespace = 2;
  string pod_name = 3;
  int32 tail_lines = 4;            // <=0 → 100
}

message GetPodLogsResponse {
  bool ok = 1;
  string error = 2;
  string logs = 3;                 // plain text
}

// ── GetDeploymentStatus ─────────────────────────────────────────────────

message GetDeploymentStatusRequest {
  jervis.common.RequestContext ctx = 1;
  string namespace = 2;
  string deployment_name = 3;
}

message GetDeploymentStatusResponse {
  bool ok = 1;
  string error = 2;
  K8sDeploymentDetail data = 3;
}

message K8sDeploymentDetail {
  string name = 1;
  string namespace = 2;
  int32 replicas = 3;
  int32 available_replicas = 4;
  bool ready = 5;
  string image = 6;
  string created_at = 7;
  repeated K8sCondition conditions = 8;
  repeated K8sEvent events = 9;
}

message K8sCondition {
  string type = 1;
  string status = 2;
  string reason = 3;
  string message = 4;
  string last_transition_time = 5;
}

message K8sEvent {
  string type = 1;
  string reason = 2;
  string message = 3;
  string time = 4;
}

// ── ScaleDeployment ─────────────────────────────────────────────────────

message ScaleDeploymentRequest {
  jervis.common.RequestContext ctx = 1;
  string namespace = 2;
  string deployment_name = 3;
  int32 replicas = 4;
}

message ScaleDeploymentResponse {
  bool ok = 1;
  string error = 2;
  string message = 3;              // "Scaled X to N replicas"
}

// ── RestartDeployment ───────────────────────────────────────────────────

message RestartDeploymentRequest {
  jervis.common.RequestContext ctx = 1;
  string namespace = 2;
  string deployment_name = 3;
}

message RestartDeploymentResponse {
  bool ok = 1;
  string error = 2;
  string message = 3;
}

// ── GetNamespaceStatus ──────────────────────────────────────────────────

message GetNamespaceStatusRequest {
  jervis.common.RequestContext ctx = 1;
  string namespace = 2;
}

message GetNamespaceStatusResponse {
  bool ok = 1;
  string error = 2;
  K8sNamespaceStatus data = 3;
}

message K8sNamespaceStatus {
  string namespace = 1;
  bool healthy = 2;
  int32 total_pods = 3;
  int32 running_pods = 4;
  repeated string crashing_pods = 5;
  int32 total_deployments = 6;
  int32 ready_deployments = 7;
  int32 total_services = 8;
}
