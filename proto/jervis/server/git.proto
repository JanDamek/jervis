syntax = "proto3";

package jervis.server;

import "jervis/common/types.proto";

option java_package = "com.jervis.contracts.server";
option java_multiple_files = true;
option java_outer_classname = "ServerGitProto";

// ServerGitService — git repository lifecycle (create via GitHub/GitLab
// API, clone into the project workspace). Also hosts GPG key lookup for
// agent commit signing (coding agent Jobs need the client's active key).
service ServerGitService {
  rpc CreateRepository(CreateRepositoryRequest) returns (CreateRepositoryResponse);
  rpc InitWorkspace(InitWorkspaceRequest) returns (InitWorkspaceResponse);
  rpc GetWorkspaceStatus(WorkspaceStatusRequest) returns (WorkspaceStatusResponse);
  rpc GetGpgKey(GetGpgKeyRequest) returns (GetGpgKeyResponse);
}

message CreateRepositoryRequest {
  jervis.common.RequestContext ctx = 1;
  string client_id = 2;
  string connection_id = 3;   // empty = resolve from client's default provider
  string name = 4;
  string description = 5;
  bool is_private = 6;
}

// CreateRepositoryResponse mirrors com.jervis.git.GitRepoCreationResult —
// the five fields the MCP tool actually formats into its reply.
message CreateRepositoryResponse {
  string clone_url = 1;
  string html_url = 2;
  string name = 3;
  string full_name = 4;
  string provider = 5;              // "github" | "gitlab"
}

message InitWorkspaceRequest {
  jervis.common.RequestContext ctx = 1;
  string project_id = 2;
}

message InitWorkspaceResponse {
  bool ok = 1;
  string project_id = 2;
  string status = 3;           // WorkspaceStatus.name | "UNKNOWN"
  string workspace_path = 4;
  string error = 5;
}

message WorkspaceStatusRequest {
  jervis.common.RequestContext ctx = 1;
  string project_id = 2;
}

message WorkspaceStatusResponse {
  string project_id = 1;
  string status = 2;           // WorkspaceStatus.name | "NONE"
  string workspace_path = 3;
  string error = 4;
}

// ── GetGpgKey ───────────────────────────────────────────────────────────

message GetGpgKeyRequest {
  jervis.common.RequestContext ctx = 1;
  string client_id = 2;
  string gpg_key_id = 3;       // blank = active key
}

message GetGpgKeyResponse {
  bool has_key = 1;            // false + no other fields set when no active key
  string key_id = 2;
  string user_name = 3;
  string user_email = 4;
  string private_key_armored = 5;
  string passphrase = 6;
  string error = 7;
}

