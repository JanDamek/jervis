syntax = "proto3";

package jervis.server;

import "jervis/common/types.proto";

option java_package = "com.jervis.contracts.server";
option java_multiple_files = true;
option java_outer_classname = "ServerO365SessionProto";

// ServerO365SessionService consolidates the three pod-to-server callbacks
// emitted by `service-o365-browser-pool`:
//   - SessionEvent — AWAITING_MFA / EXPIRED transitions (creates a USER_TASK
//     when MFA is needed; EXPIRED is now log-only because the pod self-heals).
//   - CapabilitiesDiscovered — after tab probing, the pod reports which
//     services (chat/email/calendar) actually exist; server flips the
//     connection to VALID and pushes a UI snackbar + FCM/APNs notice.
//   - Notify — kind-aware browser event (urgent_message, meeting_invite,
//     mfa, auth_request, meeting_alone_check, error, …). Dedup is applied
//     server-side for urgent_message; meeting_alone_check is suppressed
//     when the user already answered "Zůstat".
service ServerO365SessionService {
  rpc SessionEvent(SessionEventRequest) returns (SessionEventResponse);
  rpc CapabilitiesDiscovered(CapabilitiesDiscoveredRequest)
      returns (CapabilitiesDiscoveredResponse);
  rpc Notify(NotifyRequest) returns (NotifyResponse);

  // Login Consent Semaphore (global singleton across ALL connections):
  // pod MUST call AcquireLoginConsent before any login attempt that
  // could trigger an MFA push. Server pushes a notification to user's
  // devices with action buttons [Now / Defer 15min / Defer 1h / Cancel].
  // Pod long-polls WaitLoginConsent until status=granted (proceed) or
  // declined (go to ERROR). After login completes — success OR failure
  // — pod MUST call ReleaseLoginConsent so the next pod in queue can
  // get its turn. Only ONE consent push lives on user's devices at a
  // time; queued pods wait silently.
  rpc AcquireLoginConsent(AcquireLoginConsentRequest)
      returns (AcquireLoginConsentResponse);
  rpc WaitLoginConsent(WaitLoginConsentRequest)
      returns (WaitLoginConsentResponse);
  rpc ReleaseLoginConsent(ReleaseLoginConsentRequest)
      returns (ReleaseLoginConsentResponse);
}

// ── SessionEvent ────────────────────────────────────────────────────────

message SessionEventRequest {
  jervis.common.RequestContext ctx = 1;
  string client_id = 2;        // optional (server derives from device tokens)
  string connection_id = 3;
  string state = 4;            // "AWAITING_MFA" / "EXPIRED" / other
  string mfa_type = 5;         // "authenticator_number" / "authenticator_code" /
                               // "sms_code" / "phone_call"
  string mfa_message = 6;
  string mfa_number = 7;
  string vnc_url = 8;
}

message SessionEventResponse {
  string status = 1;           // "ok" / "deduped" / "suppressed"
}

// ── CapabilitiesDiscovered ──────────────────────────────────────────────

message CapabilitiesDiscoveredRequest {
  jervis.common.RequestContext ctx = 1;
  string connection_id = 2;
  repeated string available_capabilities = 3;
}

message CapabilitiesDiscoveredResponse {
  bool ok = 1;
  int32 capabilities = 2;
  string error = 3;
}

// ── Notify ──────────────────────────────────────────────────────────────

message NotifyRequest {
  jervis.common.RequestContext ctx = 1;
  string connection_id = 2;
  string kind = 3;            // urgent_message / meeting_invite / mfa /
                              // auth_request / meeting_alone_check / error / …
  string message = 4;
  string chat_id = 5;         // for dedup window on urgent_message
  string chat_name = 6;
  string sender = 7;
  string preview = 8;
  string screenshot = 9;      // URL; empty = omitted
  string mfa_code = 10;
  string meeting_id = 11;     // for alone-check suppression
}

message NotifyResponse {
  string status = 1;          // "ok" / "deduped" / "suppressed"
  string kind = 2;
  int32 priority = 3;
}

// ── Login Consent Semaphore ─────────────────────────────────────────────

message AcquireLoginConsentRequest {
  jervis.common.RequestContext ctx = 1;
  string connection_id = 2;
  string label = 3;            // human-readable "MMB - Teams"
  string reason = 4;            // "fresh_login" / "session_expired" / "fido_recovery"
}

message AcquireLoginConsentResponse {
  string request_id = 1;       // identifier for subsequent Wait/Release
  string status = 2;           // "granted" (rare — only when queue empty AND no holder)
                               // "queued" (common — wait via WaitLoginConsent)
  int32 position = 3;          // 0 if granted, otherwise queue position
  string token = 4;            // populated when status=granted
}

message WaitLoginConsentRequest {
  jervis.common.RequestContext ctx = 1;
  string request_id = 2;
  // Server long-polls up to ~60s. Pod re-issues until terminal status.
}

message WaitLoginConsentResponse {
  string status = 1;           // "queued" / "deferred" / "granted" / "declined" / "expired"
  int32 position = 2;          // updated queue position
  string deferred_until = 3;   // ISO-8601, populated on "deferred"
  string token = 4;            // populated on "granted"
  string decline_reason = 5;   // populated on "declined" / "expired"
}

message ReleaseLoginConsentRequest {
  jervis.common.RequestContext ctx = 1;
  string request_id = 2;
  string token = 3;             // must match the granted token
  string outcome = 4;           // "success" / "fail" / "expired" / "cancelled"
}

message ReleaseLoginConsentResponse {
  string status = 1;           // "ok" / "unknown_request" / "token_mismatch"
}
