syntax = "proto3";

package jervis.server;

import "jervis/common/types.proto";

option java_package = "com.jervis.contracts.server";
option java_multiple_files = true;
option java_outer_classname = "ServerVisualCaptureProto";

// ServerVisualCaptureService — inbound bridge for the
// `service-visual-capture` K8s pod. The pod pushes VLM analysis results
// here (scene/whiteboard/screen OCR) and the server fans them into
// MeetingHelperService for live UI push + KB storage. Snapshot + PTZ
// proxy endpoints keep their dedicated RPCs so the Kotlin server remains
// the single chokepoint between UI and the capture pod.
service ServerVisualCaptureService {
  rpc PostResult(VisualResultRequest) returns (VisualResultResponse);
  rpc Snapshot(SnapshotRequest) returns (RawJsonResponse);
  rpc Ptz(PtzRequest) returns (RawJsonResponse);
}

message VisualResultRequest {
  jervis.common.RequestContext ctx = 1;
  string meeting_id = 2;          // "" = not linked to a meeting
  string type = 3;                // scene | whiteboard | whiteboard_ocr | screen | screen_ocr | …
  string description = 4;
  string ocr_text = 5;
  string preset_name = 6;
  string timestamp_iso = 7;       // RFC3339; empty → now()
  string model = 8;
}

message VisualResultResponse {
  bool ok = 1;
}

message SnapshotRequest {
  jervis.common.RequestContext ctx = 1;
  string request_json = 2;        // passthrough body to the capture pod
}

message PtzRequest {
  jervis.common.RequestContext ctx = 1;
  string request_json = 2;
}

message RawJsonResponse {
  string body_json = 1;
  int32 status = 2;
}
