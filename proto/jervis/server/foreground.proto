syntax = "proto3";

package jervis.server;

import "jervis/common/types.proto";

option java_package = "com.jervis.contracts.server";
option java_multiple_files = true;
option java_outer_classname = "ServerForegroundProto";

// ServerForegroundService owns the foreground/chat GPU reservation
// signal. The orchestrator calls ForegroundStart when interactive chat
// begins (reserve local GPU away from BackgroundEngine) and ForegroundEnd
// when it completes. ChatOnCloud signals that the current chat went to
// cloud LLM — GPU stays free for background work.
service ServerForegroundService {
  rpc ForegroundStart(ForegroundStartRequest) returns (ForegroundResponse);
  rpc ForegroundEnd(ForegroundEndRequest) returns (ForegroundResponse);
  rpc ChatOnCloud(ChatOnCloudRequest) returns (ForegroundResponse);
}

message ForegroundStartRequest {
  jervis.common.RequestContext ctx = 1;
}

message ForegroundEndRequest {
  jervis.common.RequestContext ctx = 1;
}

message ChatOnCloudRequest {
  jervis.common.RequestContext ctx = 1;
}

message ForegroundResponse {
  bool ok = 1;
  string error = 2;
}
