syntax = "proto3";

package jervis.server;

import "jervis/common/types.proto";

option java_package = "com.jervis.contracts.server";
option java_multiple_files = true;
option java_outer_classname = "ServerFilterRulesProto";

// ServerFilterRulesService exposes the filtering-rules CRUD surface used
// by the orchestrator agent's tool set. Rule documents mirror the
// kotlinx-serialized `shared/common-dto` FilteringRule typed 1:1.
service ServerFilterRulesService {
  rpc Create(CreateFilterRuleRequest) returns (FilterRule);
  rpc List(ListFilterRulesRequest) returns (FilterRuleList);
  rpc Remove(RemoveFilterRuleRequest) returns (RemoveFilterRuleResponse);
}

message CreateFilterRuleRequest {
  jervis.common.RequestContext ctx = 1;
  string source_type = 2;        // FilterSourceType name
  string condition_type = 3;     // FilterConditionType name
  string condition_value = 4;
  string action = 5;             // FilterAction name (default IGNORE)
  string description = 6;
  string client_id = 7;
  string project_id = 8;
}

message ListFilterRulesRequest {
  jervis.common.RequestContext ctx = 1;
  string client_id = 2;
  string project_id = 3;
}

message RemoveFilterRuleRequest {
  jervis.common.RequestContext ctx = 1;
  string rule_id = 2;
}

// FilterRule mirrors com.jervis.dto.filtering.FilteringRule. Enum values
// ride as strings to match the kotlinx-serialized enum names.
message FilterRule {
  string id = 1;
  string scope = 2;                  // FilterScope: GLOBAL | CLIENT | PROJECT
  string source_type = 3;            // FilterSourceType
  string condition_type = 4;         // FilterConditionType
  string condition_value = 5;
  string action = 6;                 // FilterAction
  string description = 7;
  string created_at = 8;             // RFC3339
  string created_by = 9;             // default "user"
  bool enabled = 10;
}

message FilterRuleList {
  repeated FilterRule rules = 1;
}

message RemoveFilterRuleResponse {
  bool removed = 1;
}
