syntax = "proto3";

package jervis.server;

import "jervis/common/types.proto";

option java_package = "com.jervis.contracts.server";
option java_multiple_files = true;
option java_outer_classname = "ServerUrgencyProto";

// ServerUrgencyService exposes urgency config, user presence lookup, and
// task deadline bumping — feeds the orchestrator's urgency-aware
// scheduling tools. Messages mirror com.jervis.dto.urgency.UrgencyConfigDto
// / UserPresenceDto 1:1.
service ServerUrgencyService {
  rpc GetConfig(GetUrgencyConfigRequest) returns (UrgencyConfig);
  rpc UpdateConfig(UpdateUrgencyConfigRequest) returns (UrgencyConfig);
  rpc GetPresence(GetUserPresenceRequest) returns (UserPresence);
  rpc BumpDeadline(BumpDeadlineRequest) returns (BumpDeadlineResponse);
}

message GetUrgencyConfigRequest {
  jervis.common.RequestContext ctx = 1;
  string client_id = 2;
}

message UpdateUrgencyConfigRequest {
  jervis.common.RequestContext ctx = 1;
  UrgencyConfig config = 2;
}

message GetUserPresenceRequest {
  jervis.common.RequestContext ctx = 1;
  string user_id = 2;
  string platform = 3;
}

message BumpDeadlineRequest {
  jervis.common.RequestContext ctx = 1;
  string task_id = 2;
  string deadline_iso = 3;
  string reason = 4;
}

// UrgencyConfig mirrors UrgencyConfigDto.
message UrgencyConfig {
  string client_id = 1;
  int32 default_deadline_minutes = 2;              // default 30
  FastPathDeadlines fast_path_deadline_minutes = 3;
  PresenceFactor presence_factor = 4;
  int32 presence_ttl_seconds = 5;                  // default 120
  int32 classifier_budget_per_hour_per_sender = 6; // default 5
  double approaching_deadline_threshold_pct = 7;   // default 0.20
}

message FastPathDeadlines {
  int32 direct_message = 1;                        // default 2
  int32 channel_mention = 2;                       // default 5
  int32 reply_my_thread_active = 3;                // default 5
  int32 reply_my_thread_stale = 4;                 // default 10
}

message PresenceFactor {
  double active = 1;                               // default 1.0
  double away_recent = 2;                          // default 1.5
  double away_old = 3;                             // default 5.0
  double offline = 4;                              // default 10.0
  double unknown = 5;                              // default 1.0
}

message UserPresence {
  string user_id = 1;
  string platform = 2;
  string presence = 3;                             // Presence enum string
  string last_active_at_iso = 4;                   // RFC3339; empty = unknown
}

message BumpDeadlineResponse {
  bool ok = 1;
  string error = 2;
}
