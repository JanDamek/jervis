syntax = "proto3";

package jervis.o365_gateway;

import "jervis/common/types.proto";

option java_package = "com.jervis.contracts.o365_gateway";
option java_multiple_files = true;
option java_outer_classname = "O365GatewayProto";

// O365GatewayService — one umbrella gRPC for the O365 gateway pod. It
// fronts every Microsoft Graph call Jervis makes (Teams chats / channels,
// Mail, Calendar, Online meetings, Drive, session). Graph-specific DTOs
// are shared across RPC groups so the same `ChatMessage` is returned for
// Teams chats and channel reads.
//
// Typed RPCs land incrementally (slice V5a -> Teams chats, V5b -> channels,
// etc.). The legacy Request / RequestBytes passthrough stays until every
// group is typed; it is dropped in V5h.
service O365GatewayService {
  // === Legacy passthrough (drop at V5h) =====================================
  rpc Request(O365Request) returns (O365Response);
  rpc RequestBytes(O365Request) returns (O365BytesResponse);

  // === V5a - Teams chats ====================================================
  rpc ListChats(ListChatsRequest) returns (ListChatsResponse);
  rpc ReadChat(ReadChatRequest) returns (ListChatMessagesResponse);
  rpc SendChatMessage(SendChatMessageRequest) returns (ChatMessage);

  // === V5b - Teams teams / channels =========================================
  rpc ListTeams(ListTeamsRequest) returns (ListTeamsResponse);
  rpc ListChannels(ListChannelsRequest) returns (ListChannelsResponse);
  rpc ReadChannel(ReadChannelRequest) returns (ListChannelMessagesResponse);
  rpc SendChannelMessage(SendChannelMessageRequest) returns (ChatMessage);

  // === V5c - Mail (Outlook) =================================================
  rpc ListMail(ListMailRequest) returns (ListMailResponse);
  rpc ReadMail(ReadMailRequest) returns (MailMessage);
  rpc SendMail(SendMailRpcRequest) returns (SendMailAck);

  // === V5d - Calendar =======================================================
  rpc ListCalendarEvents(ListCalendarEventsRequest) returns (ListCalendarEventsResponse);
  rpc CreateCalendarEvent(CreateCalendarEventRequest) returns (CalendarEvent);

  // === V5e - Online meetings ================================================
  // Part of the O365 umbrella: online meetings are a resource inside O365,
  // not a separate service. All five RPCs live here so consumers dial one
  // channel for everything meeting-related.
  rpc GetOnlineMeetingByJoinUrl(OnlineMeetingByJoinUrlRequest) returns (OnlineMeeting);
  rpc GetOnlineMeeting(OnlineMeetingRequest) returns (OnlineMeeting);
  rpc ListMeetingRecordings(OnlineMeetingRequest) returns (ListRecordingsResponse);
  rpc ListMeetingTranscripts(OnlineMeetingRequest) returns (ListTranscriptsResponse);
  rpc DownloadTranscriptVtt(TranscriptRef) returns (TranscriptContent);
}

// ============================================================================
// Legacy passthrough messages (drop at V5h)
// ============================================================================

message O365Request {
  jervis.common.RequestContext ctx = 1;
  string method = 2;                 // GET / POST (uppercase)
  string path = 3;                   // relative to /api/o365/ - e.g. "chats/{clientId}/{chatId}/messages"
  map<string, string> query = 4;     // query parameters
  string body_json = 5;              // optional JSON body for POST
  string content_type = 6;           // override content-type (defaults to application/json)
}

message O365Response {
  int32 status_code = 1;
  string body_json = 2;              // raw JSON response body (Graph API passthrough)
  map<string, string> headers = 3;   // selected response headers (content-type, etc.)
}

message O365BytesResponse {
  int32 status_code = 1;
  bytes body = 2;                    // raw binary body (drive content, recording audio/video)
  string content_type = 3;
  string filename = 4;
  map<string, string> headers = 5;
}

// ============================================================================
// Shared Graph message types (Teams chats + channels)
// ============================================================================

message GraphUser {
  string id = 1;
  string display_name = 2;
}

message GraphApplication {
  string id = 1;
  string display_name = 2;
}

message MessageBody {
  string content_type = 1;           // "text" | "html"
  string content = 2;
}

message MessageFrom {
  GraphUser user = 1;
  GraphApplication application = 2;
}

message MessagePreview {
  string id = 1;
  string created_date_time = 2;
  MessageBody body = 3;
  MessageFrom sender = 4;
}

// ChatMessage - single message in a Teams chat or channel.
message ChatMessage {
  string id = 1;
  string created_date_time = 2;
  string last_modified_date_time = 3;
  MessageBody body = 4;
  MessageFrom sender = 5;
  string message_type = 6;
}

// ChatSummary - per-chat entry returned by ListChats.
message ChatSummary {
  string id = 1;
  string topic = 2;
  string chat_type = 3;
  string created_date_time = 4;
  string last_updated_date_time = 5;
  MessagePreview last_message_preview = 6;
}

// ============================================================================
// Teams chats - requests / responses (V5a)
// ============================================================================

message ListChatsRequest {
  jervis.common.RequestContext ctx = 1;
  string client_id = 2;
  int32 top = 3;                     // default 20, max 50
}

message ListChatsResponse {
  repeated ChatSummary chats = 1;
}

message ReadChatRequest {
  jervis.common.RequestContext ctx = 1;
  string client_id = 2;
  string chat_id = 3;
  int32 top = 4;                     // default 20
}

message ListChatMessagesResponse {
  repeated ChatMessage messages = 1;
}

message SendChatMessageRequest {
  jervis.common.RequestContext ctx = 1;
  string client_id = 2;
  string chat_id = 3;
  string content = 4;
  string content_type = 5;           // "text" | "html", defaults to "text"
}

// ============================================================================
// Teams teams / channels (V5b)
// ============================================================================

message Team {
  string id = 1;
  string display_name = 2;
  string description = 3;
}

message Channel {
  string id = 1;
  string display_name = 2;
  string description = 3;
  string membership_type = 4;        // "standard" | "private" | "shared"
}

message ListTeamsRequest {
  jervis.common.RequestContext ctx = 1;
  string client_id = 2;
}

message ListTeamsResponse {
  repeated Team teams = 1;
}

message ListChannelsRequest {
  jervis.common.RequestContext ctx = 1;
  string client_id = 2;
  string team_id = 3;
}

message ListChannelsResponse {
  repeated Channel channels = 1;
}

message ReadChannelRequest {
  jervis.common.RequestContext ctx = 1;
  string client_id = 2;
  string team_id = 3;
  string channel_id = 4;
  int32 top = 5;                     // default 20
}

message ListChannelMessagesResponse {
  repeated ChatMessage messages = 1;
}

message SendChannelMessageRequest {
  jervis.common.RequestContext ctx = 1;
  string client_id = 2;
  string team_id = 3;
  string channel_id = 4;
  string content = 5;
  string content_type = 6;           // "text" | "html", defaults to "text"
}

// ============================================================================
// Mail / Outlook (V5c)
// ============================================================================

message EmailAddress {
  string name = 1;
  string address = 2;
}

// Recipient wraps EmailAddress to mirror Microsoft Graph's nested shape
// (`{ emailAddress: { name, address } }`) so SendMail can serialise it
// back onto Graph without extra translation.
message Recipient {
  EmailAddress email_address = 1;
}

message MailBody {
  string content_type = 1;           // "text" | "html"
  string content = 2;
}

message MailSender {
  EmailAddress email_address = 1;
}

message MailMessage {
  string id = 1;
  string subject = 2;
  string body_preview = 3;
  MailBody body = 4;
  MailSender sender = 5;             // Graph returns this under `from`
  repeated Recipient to_recipients = 6;
  repeated Recipient cc_recipients = 7;
  string received_date_time = 8;
  string sent_date_time = 9;
  bool is_read = 10;
  bool is_draft = 11;
  bool has_attachments = 12;
  string importance = 13;
  string conversation_id = 14;
}

message ListMailRequest {
  jervis.common.RequestContext ctx = 1;
  string client_id = 2;
  int32 top = 3;                     // default 20
  string folder = 4;                 // default "inbox"
  string filter = 5;                 // optional OData $filter
}

message ListMailResponse {
  repeated MailMessage messages = 1;
}

message ReadMailRequest {
  jervis.common.RequestContext ctx = 1;
  string client_id = 2;
  string message_id = 3;
}

message SendMailRpcRequest {
  jervis.common.RequestContext ctx = 1;
  string client_id = 2;
  string subject = 3;
  MailBody body = 4;
  repeated Recipient to_recipients = 5;
  repeated Recipient cc_recipients = 6;
  bool save_to_sent_items = 7;
}

message SendMailAck {
  string result = 1;                 // "Mail sent successfully"
}

// ============================================================================
// Calendar (V5d)
// ============================================================================

message DateTimeTimeZone {
  string date_time = 1;
  string time_zone = 2;
}

message Location {
  string display_name = 1;
}

message Attendee {
  EmailAddress email_address = 1;
  string type = 2;                   // "required" | "optional" | "resource"
  string response = 3;               // attendee response status
}

message CalendarEvent {
  string id = 1;
  string subject = 2;
  MailBody body = 3;
  DateTimeTimeZone start = 4;
  DateTimeTimeZone end = 5;
  Location location = 6;
  EmailAddress organizer = 7;
  repeated Attendee attendees = 8;
  bool is_all_day = 9;
  bool is_cancelled = 10;
  bool is_online_meeting = 11;
  string online_meeting_url = 12;
  string show_as = 13;
  string web_link = 14;
  string odata_etag = 15;            // upstream Graph @odata.etag for change detection
}

message ListCalendarEventsRequest {
  jervis.common.RequestContext ctx = 1;
  string client_id = 2;
  int32 top = 3;                     // default 20
  string start_date_time = 4;        // optional; if set with end -> calendarView range
  string end_date_time = 5;
}

message ListCalendarEventsResponse {
  repeated CalendarEvent events = 1;
}

message CreateCalendarEventRequest {
  jervis.common.RequestContext ctx = 1;
  string client_id = 2;
  string subject = 3;
  MailBody body = 4;
  DateTimeTimeZone start = 5;
  DateTimeTimeZone end = 6;
  Location location = 7;
  repeated Attendee attendees = 8;
  bool is_online_meeting = 9;
}

// ============================================================================
// Online meetings (V5e) — Microsoft Graph me/onlineMeetings
// ============================================================================

message ChatInfo {
  string thread_id = 1;              // reusable as chatId in me/chats/{chatId}
  string message_id = 2;
  string reply_chain_message_id = 3;
}

message MeetingParticipant {
  GraphUser user = 1;
  string role = 2;
  string upn = 3;
}

message MeetingParticipants {
  MeetingParticipant organizer = 1;
  repeated MeetingParticipant attendees = 2;
}

message OnlineMeeting {
  string id = 1;
  string join_web_url = 2;
  string subject = 3;
  string start_date_time = 4;
  string end_date_time = 5;
  ChatInfo chat_info = 6;
  MeetingParticipants participants = 7;
}

message CallRecording {
  string id = 1;
  string meeting_id = 2;
  string call_id = 3;
  string created_date_time = 4;
  string recording_content_url = 5;
  string content_correlation_id = 6;
}

message CallTranscript {
  string id = 1;
  string meeting_id = 2;
  string created_date_time = 3;
  string transcript_content_url = 4;
}

message OnlineMeetingByJoinUrlRequest {
  jervis.common.RequestContext ctx = 1;
  string client_id = 2;
  string join_web_url = 3;
}

message OnlineMeetingRequest {
  jervis.common.RequestContext ctx = 1;
  string client_id = 2;
  string meeting_id = 3;
}

message ListRecordingsResponse {
  repeated CallRecording recordings = 1;
}

message ListTranscriptsResponse {
  repeated CallTranscript transcripts = 1;
}

message TranscriptRef {
  jervis.common.RequestContext ctx = 1;
  string client_id = 2;
  string meeting_id = 3;
  string transcript_id = 4;
}

message TranscriptContent {
  bytes vtt = 1;                     // raw VTT text, binary-safe
  string content_type = 2;           // "text/vtt"
}
