syntax = "proto3";

package jervis.correction;

import "jervis/common/types.proto";

option java_package = "com.jervis.contracts.correction";
option java_multiple_files = true;
option java_outer_classname = "CorrectionProto";

// CorrectionService — transcript correction service (KB-stored rules +
// Ollama GPU). Passthrough JSON: the Kotlin DTOs on the caller side
// already ride kotlinx.serialization, so we keep the body_json pattern
// to avoid double-typing every field in the proto.
service CorrectionService {
  rpc SubmitCorrection(CorrectionRequest) returns (CorrectionResponse);
  rpc CorrectTranscript(CorrectionRequest) returns (CorrectionResponse);
  rpc ListCorrections(CorrectionRequest) returns (CorrectionResponse);
  rpc AnswerCorrectionQuestions(CorrectionRequest) returns (CorrectionResponse);
  rpc CorrectWithInstruction(CorrectionRequest) returns (CorrectionResponse);
  rpc CorrectTargeted(CorrectionRequest) returns (CorrectionResponse);
  rpc DeleteCorrection(CorrectionRequest) returns (CorrectionResponse);
}

message CorrectionRequest {
  jervis.common.RequestContext ctx = 1;
  string body_json = 2;
}

message CorrectionResponse {
  int32 status = 1;
  string body_json = 2;
}
