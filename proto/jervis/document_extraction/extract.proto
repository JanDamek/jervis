syntax = "proto3";

package jervis.document_extraction;

import "jervis/common/types.proto";

option java_package = "com.jervis.contracts.document_extraction";
option java_multiple_files = true;
option java_outer_classname = "DocumentExtractionProto";

// DocumentExtractionService — takes any binary content (PDF, DOCX, XLSX,
// HTML, images) and returns clean plain text. Replaces the former
// `POST /extract` and `POST /extract-base64` FastAPI routes; the callers
// now ride a single unary RPC with the bytes inline (64 MiB cap — for
// anything larger the blob side channel is the answer).
service DocumentExtractionService {
  rpc Extract(ExtractRequest) returns (ExtractResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
}

message ExtractRequest {
  jervis.common.RequestContext ctx = 1;
  bytes content = 2;                     // file bytes inline
  string filename = 3;
  string mime_type = 4;
  string max_tier = 5;                   // "NONE" / "LIGHT" / "HEAVY"
}

message ExtractedPage {
  int32 page_number = 1;
  string text = 2;
}

message ExtractResponse {
  string text = 1;
  string method = 2;                     // pymupdf | vlm | hybrid | direct | html | docx | xlsx
  map<string, string> metadata = 3;      // free-form extractor metadata
  repeated ExtractedPage pages = 4;      // PDF-only page breakdown
}

message HealthRequest {
  jervis.common.RequestContext ctx = 1;
}

message HealthResponse {
  string status = 1;
  string service = 2;
}
