syntax = "proto3";

package jervis.orchestrator;

import "jervis/common/types.proto";

option java_package = "com.jervis.contracts.orchestrator";
option java_multiple_files = true;
option java_outer_classname = "OrchestratorVoiceProto";

// OrchestratorVoiceService — post-transcription voice pipeline. Process
// streams the intent-classified agentic reply. Hint returns a KB-based
// live-assist hint (single unary response).
service OrchestratorVoiceService {
  rpc Process(VoiceProcessRequest) returns (stream VoiceStreamEvent);
  rpc Hint(VoiceHintRequest) returns (VoiceHintResponse);
}

message VoiceProcessRequest {
  jervis.common.RequestContext ctx = 1;
  string text = 2;                     // transcribed text from Whisper
  string source = 3;                   // app_chat | watch_chat | siri_watch
  string client_id = 4;
  string project_id = 5;
  string group_id = 6;
  bool tts = 7;                        // generate TTS audio response
  string meeting_id = 8;
  bool live_assist = 9;
  int32 chunk_index = 10;
  bool is_final = 11;
}

// VoiceStreamEvent carries one of the agentic pipeline's stages. The
// payload shapes mirror what app/voice/stream_handler.py +
// app/voice/quick_responder.py yield — each variant holds only the
// fields actually produced on that branch.
message VoiceStreamEvent {
  oneof payload {
    PreliminaryAnswer preliminary_answer = 1;
    Responding responding = 2;
    Token token = 3;
    Response response = 4;
    Stored stored = 5;
    Done done = 6;
    ErrorPayload error = 7;
  }
}

message PreliminaryAnswer {
  string text = 1;
  double confidence = 2;              // 0.0–1.0 (quick_responder KB match)
}

message Responding {}

message Token {
  string text = 1;
}

message Response {
  string text = 1;
  bool complete = 2;
}

message Stored {
  string kind = 1;                    // "finding" etc.
  string summary = 2;
}

message Done {}

message ErrorPayload {
  string text = 1;
}

// ── Hint ──────────────────────────────────────────────────────────────

message VoiceHintRequest {
  jervis.common.RequestContext ctx = 1;
  string text = 2;
  string client_id = 3;
  string project_id = 4;
}

message VoiceHintResponse {
  string hint = 1;                     // empty when no relevant hint
}
