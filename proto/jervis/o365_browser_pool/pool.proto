syntax = "proto3";

package jervis.o365_browser_pool;

import "jervis/common/types.proto";

option java_package = "com.jervis.contracts.o365_browser_pool";
option java_multiple_files = true;
option java_outer_classname = "O365BrowserPoolProto";

// O365BrowserPoolService — gRPC passthrough on top of the per-client
// browser pod. Replaces the former REST surface consumed by the Kotlin
// server (/health, /session/{cid}, /session/{cid}/init,
// /session/{cid}/mfa, /session/{cid}/rediscover, /scrape/{cid}/discover,
// /vnc-token/{cid}, /instruction/{cid}). The VNC proxy routes
// (/vnc-login, /vnc-auth) stay HTTP — they're browser-facing.
service O365BrowserPoolService {
  rpc Health(HealthRequest) returns (RawResponse);
  rpc SessionStatus(PodRequest) returns (RawResponse);
  rpc SessionInit(PodRequest) returns (RawResponse);
  rpc SessionMfa(PodRequest) returns (RawResponse);
  rpc SessionRediscover(PodRequest) returns (RawResponse);
  rpc ScrapeDiscover(PodRequest) returns (RawResponse);
  rpc VncToken(PodRequest) returns (RawResponse);
  rpc SendInstruction(PodRequest) returns (RawResponse);
}

message HealthRequest {
  jervis.common.RequestContext ctx = 1;
}

// PodRequest carries client_id + optional JSON body for POSTs. Each RPC
// implements the corresponding route's semantics in the pod and returns
// the legacy JSON response unchanged so Kotlin parsing stays identical.
message PodRequest {
  jervis.common.RequestContext ctx = 1;
  string client_id = 2;
  string body_json = 3;
}

message RawResponse {
  int32 status = 1;
  string body_json = 2;
}
