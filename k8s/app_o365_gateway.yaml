# =============================================================================
# Jervis O365 Gateway – K8s Deployment
#
# Stateless API service. Accepts tool calls from MCP/orchestrator,
# fetches tokens from browser pool, calls Microsoft Graph API.
# Traffic: gRPC on :5501 (O365GatewayService). HTTP on :8080 is kept
# only for liveness/readiness probes.
# =============================================================================

# ===== Deployment =====
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jervis-o365-gateway
  namespace: jervis
spec:
  revisionHistoryLimit: 2
  replicas: 1
  selector:
    matchLabels:
      app: jervis-o365-gateway
  template:
    metadata:
      labels:
        app: jervis-o365-gateway
    spec:
      securityContext:
        runAsUser: 1090
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: gateway
          image: registry.damek-soft.eu/jandamek/jervis-o365-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 5501
              name: grpc
          env:
            - name: O365_GRPC_PORT
              value: "5501"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
# ===== Service =====
apiVersion: v1
kind: Service
metadata:
  name: jervis-o365-gateway
  namespace: jervis
spec:
  selector:
    app: jervis-o365-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: grpc
      port: 5501
      targetPort: 5501
