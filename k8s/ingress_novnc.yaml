# Jervis noVNC ingress — all traffic goes through FastAPI on port 8090
# Auth is handled by the application (cookie-based, one-time token)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jervis-novnc-ingress
  namespace: jervis
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/websocket-services: jervis-o365-browser-pool-lb
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "JERVIS_VNC_POD"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "3600"
spec:
  tls:
    - hosts:
        - jervis-vnc.damek-soft.eu
      secretName: jervis-vnc-tls-cert
  rules:
    - host: jervis-vnc.damek-soft.eu
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jervis-o365-browser-pool-pod0
                port:
                  number: 8090
