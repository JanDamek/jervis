# Jervis noVNC ingress — routes to VNC router (nginx + Lua)
# VNC router parses connectionId from token/cookie and proxies to correct browser pod
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jervis-novnc-ingress
  namespace: jervis
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/websocket-services: jervis-vnc-router
spec:
  tls:
    - hosts:
        - jervis-vnc.damek-soft.eu
      secretName: jervis-vnc-tls-cert
  rules:
    - host: jervis-vnc.damek-soft.eu
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jervis-vnc-router
                port:
                  number: 8080
