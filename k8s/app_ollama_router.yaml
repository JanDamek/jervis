apiVersion: apps/v1
kind: Deployment
metadata:
  name: jervis-ollama-router
  namespace: jervis
spec:
  revisionHistoryLimit: 2
  replicas: 1
  selector:
    matchLabels:
      app: jervis-ollama-router
  template:
    metadata:
      labels:
        app: jervis-ollama-router
    spec:
      securityContext:
        runAsUser: 1080
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: router
          image: registry.damek-soft.eu/jandamek/jervis-ollama-router:latest
          imagePullPolicy: Always
          ports:
            - name: ollama-http
              containerPort: 11430
            - name: grpc
              containerPort: 5501
          envFrom:
            - configMapRef:
                name: jervis-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /router/health
              port: 11430
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30  # 10 + 30*10 = 310s max startup (model preload takes 2-3 min)
          livenessProbe:
            httpGet:
              path: /router/health
              port: 11430
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /router/health
              port: 11430
            periodSeconds: 10
      imagePullSecrets:
        - name: regcred
---
apiVersion: v1
kind: Service
metadata:
  name: jervis-ollama-router
  namespace: jervis
spec:
  selector:
    app: jervis-ollama-router
  ports:
    - name: ollama-http
      protocol: TCP
      port: 11430
      targetPort: 11430
    - name: grpc
      protocol: TCP
      port: 5501
      targetPort: 5501
      # Exposed as NodePort so services running outside the cluster (XTTS
      # and whisper on the GPU VM) can dial the router over gRPC. Static
      # port so env vars don't change across re-applies.
      nodePort: 30501
  type: NodePort
---
# Ingress for local access from GPU VM (whisper → router coordination).
# HTTP only — local domain, no TLS (Let's Encrypt won't sign .local).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jervis-ollama-router-ingress
  namespace: jervis
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
spec:
  rules:
    - host: jervis-router.lan.mazlusek.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jervis-ollama-router
                port:
                  number: 11430
    - host: jervis-router
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jervis-ollama-router
                port:
                  number: 11430
