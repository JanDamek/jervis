apiVersion: apps/v1
kind: Deployment
metadata:
  name: jervis-correction
  namespace: jervis
spec:
  revisionHistoryLimit: 2
  replicas: 1
  selector:
    matchLabels:
      app: jervis-correction
  template:
    metadata:
      labels:
        app: jervis-correction
    spec:
      securityContext:
        runAsUser: 1060
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: correction
          image: registry.damek-soft.eu/jandamek/jervis-correction:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
            - name: grpc
              containerPort: 5501
          env:
            - name: CORRECTION_GRPC_PORT
              value: "5501"
          envFrom:
            - configMapRef:
                name: jervis-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: jervis-correction
  namespace: jervis
spec:
  selector:
    app: jervis-correction
  ports:
    - name: http
      port: 8000
      targetPort: 8000
    - name: grpc
      port: 5501
      targetPort: 5501
