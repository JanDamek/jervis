# Jervis WhatsApp Browser noVNC ingress
# Provides web-based VNC access to the headless WhatsApp browser session
# for debugging and QR code scanning.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jervis-whatsapp-vnc-ingress
  namespace: jervis
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/websocket-services: jervis-whatsapp-browser
spec:
  tls:
    - hosts:
        - jervis-whatsapp-vnc.damek-soft.eu
      secretName: jervis-whatsapp-vnc-tls-cert
  rules:
    - host: jervis-whatsapp-vnc.damek-soft.eu
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jervis-whatsapp-browser
                port:
                  number: 6080
