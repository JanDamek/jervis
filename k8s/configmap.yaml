---
# =============================================================================
# Jervis Server – Production Configuration (K8s ConfigMap)
# Mounted as /opt/jervis/config/application.yml in the server container.
#
# Differences from local (backend/server/src/main/resources/application.yml):
# - K8s service names instead of localhost
# - Higher timeouts (30min request/socket vs 11min local)
# - qualifier.max-retries/backoff config (not in local)
# - No data-dir overrides
#
# Ollama endpoints and model routing are in models-config.yaml (not duplicated here).
# See docs/structures.md § "Ollama Instance Architecture" for hardware layout.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: jervis-server-config
  namespace: jervis
data:
  application.yml: |
    # -- Logging ----------------------------------------------------------------
    logging:
      level:
        root: INFO
        com.jervis: INFO
        io.ktor: INFO
        org.springframework: INFO
        com.arangodb.internal.serde.SerdeUtils: INFO
        com.jervis.qualifier: INFO
        org.springframework.web: WARN
        org.springframework.web.reactive.socket: WARN
        org.springframework.web.reactive.handler: WARN
        org.springframework.data.mongodb.core.convert.QueryMapper: WARN
      pattern:
        console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
        file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
      file:
        name: /opt/jervis/data/logs/jervis-server.log
      logback:
        rollingpolicy:
          max-history: 7
          max-file-size: 10MB

    # -- Spring / MongoDB -------------------------------------------------------
    spring:
      main:
        web-application-type: none   # Non-web (RSocket + custom transport)
      mongodb:
        host: nas.lan.mazlusek.com
        port: 27017
        database: jervis
        username: root
        password: ${MONGODB_PASSWORD}
        authentication-database: admin
      data:
        mongodb:
          auto-index-creation: false

    # -- Weaviate (vector store for RAG) ----------------------------------------
    weaviate:
      host: nas.lan.mazlusek.com
      port: 8080                     # REST API
      scheme: http
      grpc-port: 50051               # gRPC for fast vector ops
      hybrid-search:
        enabled: true
        alpha: 0.85                  # 0.85 = vector-heavy hybrid search
      auto-migrate:
        countdown-seconds: 10

    data:
      root-dir: /opt/jervis/data     # Mounted PVC (jervis-data-pvc)

    # -- ArangoDB (knowledge graph) ---------------------------------------------
    arango:
      scheme: http
      host: nas.lan.mazlusek.com
      port: 8529
      database: jervis
      username: root
      password: ${ARANGO_PASSWORD}
      timeout-ms: 5000

    # -- Jervis core settings ---------------------------------------------------
    jervis:
      security:
        client-token: a7f3c9e2-4b8d-11ef-9a1c-0242ac120002  # RSocket auth token
      qualifier:
        max-retries: 5              # Max retries for qualifier agent per task
        initial-backoff-ms: 1000    # Initial retry delay (1s)
        max-backoff-ms: 300000      # Max retry delay (5min)
      background:
        wait-on-startup: 10s         # Delay before BackgroundEngine starts
        wait-on-error: 1m           # Delay after error before retrying
        wait-interval: 30s           # Qualification loop sleep between cycles
      kb-callback-base-url: "http://jervis-server:5500"  # KB progress push callback URL

    link:
      indexing:
        skip-if-indexed-within: 30d

    # -- Whisper transcription (REST-only, max accuracy) -------------------------
    whisper:
      rest-remote-url: http://ollama.lan.mazlusek.com:8786
      model: large-v3
      beam-size: 10
      vad-filter: true
      condition-on-previous-text: true
      no-speech-threshold: 0.3
      diarize: true
      timeout-multiplier: 5
      min-timeout-seconds: 600

    # -- TTS (XTTS v2 GPU on VD) ------------------------------------------------
    tts:
      url: http://ollama.lan.mazlusek.com:8787
      speed: 1.2

    # -- Coding tools (Aider, OpenHands, Claude, Junie) ------------------------
    coding-tools:
      aider:
        default-provider: ollama     # GPU instance (:11434)
        default-model: "qwen3-coder-tool:30b"
        paid-provider: anthropic
        paid-model: "claude-3-5-sonnet-20241022"
      openhands:
        default-provider: ollama
        default-model: "qwen3-coder-tool:30b"
        paid-provider: anthropic
        paid-model: "claude-3-5-sonnet-20241022"
        ollama-base-url: http://jervis-ollama-router:11430  # Via Ollama Router
      claude:
        default-provider: anthropic  # Claude Code always uses cloud
        default-model: "claude-sonnet-4-20250514"
        paid-provider: anthropic
        paid-model: "claude-sonnet-4-20250514"
      junie:
        default-provider: anthropic  # Junie coding agent
        default-model: "claude-3-5-sonnet-20241022"
        paid-provider: anthropic
        paid-model: "claude-3-5-sonnet-20241022"

    # -- Microservice endpoints (K8s service names) -----------------------------
    # Ollama endpoints are in models-config.yaml, not here.
    endpoints:
      searxng:
        baseUrl: http://nas.lan.mazlusek.com:30053/       # SearXNG web search (NodePort)
      document-extraction:
        baseUrl: http://jervis-document-extraction:8080/  # Python document extraction (HTML, PDF, DOCX, XLSX, images)
      knowledgebase:
        baseUrl: http://jervis-knowledgebase:8080/        # Python KB (RAG+Graph) - read operations
      knowledgebase-write:
        baseUrl: http://jervis-knowledgebase-write:8080/  # Python KB - write operations (ingest)
      orchestrator:
        baseUrl: http://jervis-orchestrator:8090/    # Python orchestrator (LangGraph)
      correction:
        baseUrl: http://jervis-correction:8000/      # Python correction service (transcript correction)
      ollama-router:
        url: http://jervis-ollama-router:11430       # Ollama Router (GPU routing, model errors)
      providers:
        github: ws://jervis-github:8085/             # GitHub integration
        gitlab: ws://jervis-gitlab:8086/             # GitLab integration
        atlassian: ws://jervis-atlassian:8084/       # Atlassian (Jira/Confluence)


---
# =============================================================================
# Jervis Unified Configuration (K8s ConfigMap)
# Single ConfigMap for ALL Python microservices.
# Injected as env vars via envFrom in each deployment YAML.
#
# Shared values are defined ONCE. Service-specific values are prefixed.
# Python services read shared values directly (no env_prefix).
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: jervis-config
  namespace: jervis
data:
  # ── SHARED: Microservice endpoints (defined ONCE) ─────────────────────
  KOTLIN_SERVER_URL: "http://jervis-server:5500"
  KNOWLEDGEBASE_URL: "http://jervis-knowledgebase:8080"
  KNOWLEDGEBASE_WRITE_URL: "http://jervis-knowledgebase-write:8080"
  OLLAMA_ROUTER_URL: "http://jervis-ollama-router:11430"
  SEARXNG_URL: "http://nas.lan.mazlusek.com:30053"
  DOCUMENT_EXTRACTION_URL: "http://jervis-document-extraction:8080"
  MCP_URL: "http://jervis-mcp:8100"
  O365_GATEWAY_URL: "http://jervis-o365-gateway:8080"

  # ── SHARED: Storage backends ──────────────────────────────────────────
  MONGODB_HOST: "nas.lan.mazlusek.com"
  MONGODB_PORT: "27017"
  MONGODB_USER: "root"
  MONGODB_DATABASE: "jervis"
  WEAVIATE_URL: "http://nas.lan.mazlusek.com:8080"
  WEAVIATE_GRPC_URL: "nas.lan.mazlusek.com:50051"
  ARANGO_URL: "http://nas.lan.mazlusek.com:8529"
  ARANGO_DB: "jervis"
  ARANGO_USER: "root"

  # ── SHARED: Ollama endpoints (all via Ollama Router on :11430) ────────
  OLLAMA_BASE_URL: "http://jervis-ollama-router:11430"
  OLLAMA_EMBEDDING_BASE_URL: "http://jervis-ollama-router:11430"
  OLLAMA_INGEST_BASE_URL: "http://jervis-ollama-router:11430"
  OLLAMA_API_BASE: "http://jervis-ollama-router:11430"

  # ── SHARED: Reranker (TEI) ─────────────────────────────────────────────
  RERANKER_URL: "http://jervis-reranker:8080"

  # ── KB: Knowledge Base service ────────────────────────────────────────
  LLM_MODEL: "qwen3:14b"
  INGEST_MODEL_SIMPLE: "qwen3:14b"
  INGEST_MODEL_COMPLEX: "qwen3:14b"
  INGEST_CONTEXT_CAP: "32768"

  # ── ORCHESTRATOR: Orchestrator service ────────────────────────────────
  ORCHESTRATOR_PORT: "8090"
  K8S_NAMESPACE: "jervis"
  DATA_ROOT: "/opt/jervis/data"
  CONTAINER_REGISTRY: "registry.damek-soft.eu/jandamek"
  MCP_API_TOKEN: "72f78904b9974741fd4d2d6eef3055418b90f4a190096b631cf0266df34c5304"

  # ── OLLAMA ROUTER: GPU/CPU routing proxy ──────────────────────────────
  ROUTER_PORT: "11430"
  GPU_BACKENDS: '[{"url":"http://nas.lan.mazlusek.com:11434","vram_gb":24,"name":"p40-1"},{"url":"http://ollama.lan.mazlusek.com:11434","vram_gb":24,"name":"p40-2"}]'
  ORCHESTRATOR_MODEL: "qwen3-coder-tool:30b"
  GPU_MODEL_SETS: '{"p40-1":["qwen3-coder-tool:30b"],"p40-2":["bge-m3","qwen3:14b","qwen3-vl-tool:latest"]}'
  ORCHESTRATOR_RESERVATION_TIMEOUT_S: "600"
  ORCHESTRATOR_IDLE_TIMEOUT_S: "60"
  MODEL_LOAD_TIMEOUT_S: "300"
  BACKGROUND_LOAD_DELAY_S: "5"
  DEFAULT_KEEP_ALIVE: "-1"
  GPU_IDLE_NOTIFY_AFTER_S: "120"

  # ── MCP: MCP Server ──────────────────────────────────────────────────
  MCP_HOST: "0.0.0.0"
  MCP_PORT: "8100"
  MCP_DEFAULT_CLIENT_ID: ""
  MCP_DEFAULT_PROJECT_ID: ""

  # ── O365 BROWSER POOL: Browser session management ────────────────────
  O365_POOL_HEADLESS: "false"
  O365_POOL_MAX_CONTEXTS: "10"
  O365_POOL_NOVNC_ENABLED: "true"

  # ── CORRECTION: Transcript correction service ────────────────────────
  OLLAMA_URL: "http://jervis-ollama-router:11430"
  DEFAULT_CORRECTION_MODEL: "qwen3-coder-tool:30b"
