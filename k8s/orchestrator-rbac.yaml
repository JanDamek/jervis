apiVersion: v1
kind: ServiceAccount
metadata:
  name: jervis-orchestrator
  namespace: jervis
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jervis-orchestrator-role
  namespace: jervis
rules:
  # Create/manage Jobs for coding agents
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete", "watch"]
  # Read pod status and logs (for Running Processes panel + log streaming)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Create ConfigMaps for task instructions
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jervis-orchestrator-binding
  namespace: jervis
subjects:
  - kind: ServiceAccount
    name: jervis-orchestrator
    namespace: jervis
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jervis-orchestrator-role
---
# ── Coding Agent ServiceAccount ──────────────────────────────────────────
# Used by K8s Jobs spawned by the orchestrator. RBAC per environment
# namespace is created dynamically by EnvironmentK8sService.ensureAgentRbac().
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jervis-coding-agent
  namespace: jervis
  labels:
    managed-by: jervis-server
---
# ── Environment Manager: ClusterRole for dynamic namespace management ────
# The Jervis server creates/deletes K8s namespaces dynamically for
# test environments. This requires cluster-level permissions.
# Only namespaces with label "managed-by=jervis-server" are affected.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jervis-environment-manager
rules:
  # Create/manage namespaces for test environments
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "get", "list", "delete", "patch"]
  # Full management of resources within environment namespaces
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec", "services", "configmaps", "secrets", "persistentvolumeclaims", "events"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # RBAC for coding agent ServiceAccount per environment namespace
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jervis-environment-manager-binding
subjects:
  - kind: ServiceAccount
    name: jervis-orchestrator
    namespace: jervis
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: jervis-environment-manager
