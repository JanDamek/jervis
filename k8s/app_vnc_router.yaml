# =============================================================================
# Jervis VNC Router – centralized nginx proxy for browser pod VNC access
#
# Routes VNC requests to the correct browser pod based on connectionId
# parsed from token (first request) or cookie (subsequent requests).
#
# Token/cookie format: {connectionId}_{random/sessionId}
# Resolves to: http://jervis-browser-{connectionId}.jervis.svc.cluster.local:8090
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: jervis-vnc-router
  namespace: jervis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jervis-vnc-router
  template:
    metadata:
      labels:
        app: jervis-vnc-router
    spec:
      containers:
        - name: vnc-router
          image: registry.damek-soft.eu/jandamek/jervis-vnc-router:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: jervis-vnc-router
  namespace: jervis
spec:
  selector:
    app: jervis-vnc-router
  ports:
    - name: http
      port: 8080
      targetPort: 8080
