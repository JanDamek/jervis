# =============================================================================
# Logging stack ingresses — internal only, no TLS, no auth.
#   - kibana.lan.mazlusek.com         → Kibana UI
#   - elasticsearch.lan.mazlusek.com  → ES :9200 (filebeat from VD writes here)
# =============================================================================
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kibana-ingress
  namespace: logging
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: kibana.lan.mazlusek.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kibana
                port:
                  number: 5601
    - host: kibana
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kibana
                port:
                  number: 5601
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: elasticsearch-ingress
  namespace: logging
  annotations:
    kubernetes.io/ingress.class: nginx
    # Filebeat from VD posts bulk indexing requests up to ~10 MB; bump body size.
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
spec:
  rules:
    - host: elasticsearch.lan.mazlusek.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: elasticsearch
                port:
                  number: 9200
