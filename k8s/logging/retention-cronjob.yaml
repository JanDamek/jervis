# =============================================================================
# Log retention CronJob — deletes indices older than 7 days
# Runs daily at 02:00
# =============================================================================
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: log-retention
  namespace: logging
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: curator
              image: curlimages/curl:8.5.0
              command:
                - /bin/sh
                - -c
                - |
                  ES_URL="http://elasticsearch.logging.svc.cluster.local:9200"
                  RETENTION_DAYS=7
                  CUTOFF=$(date -u -d "-${RETENTION_DAYS} days" +%Y.%m.%d 2>/dev/null || date -u -v-${RETENTION_DAYS}d +%Y.%m.%d)
                  echo "Cutoff date: ${CUTOFF} (retention=${RETENTION_DAYS}d)"

                  for PREFIX in k8s-logs unifi-syslog unifi-controller; do
                    echo "--- Scanning ${PREFIX}-* ---"
                    INDICES=$(curl -s "${ES_URL}/_cat/indices/${PREFIX}-*?h=index" 2>/dev/null)
                    if [ -z "$INDICES" ]; then
                      echo "No ${PREFIX}-* indices found"
                      continue
                    fi
                    echo "$INDICES" | while read -r line; do
                      INDEX=$(echo "$line" | awk '{print $1}')
                      INDEX_DATE=$(echo "$INDEX" | sed "s/${PREFIX}-//")
                      if [ "$INDEX_DATE" \< "$CUTOFF" ]; then
                        echo "Deleting ${INDEX} (date=${INDEX_DATE} < cutoff=${CUTOFF})"
                        curl -s -X DELETE "${ES_URL}/${INDEX}"
                        echo ""
                      fi
                    done
                  done
                  echo "Retention cleanup complete"
