# =============================================================================
# Log retention CronJob — deletes indices older than 7 days
# Runs daily at 02:00
# =============================================================================
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: log-retention
  namespace: logging
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: curator
              image: curlimages/curl:8.5.0
              command:
                - /bin/sh
                - -c
                - |
                  ES_URL="http://elasticsearch.logging.svc.cluster.local:9200"
                  RETENTION_DAYS=7
                  echo "Checking indices older than ${RETENTION_DAYS} days..."

                  # Get all k8s-logs indices
                  INDICES=$(curl -s "${ES_URL}/_cat/indices/k8s-logs-*?h=index,creation.date.string" 2>/dev/null)
                  if [ -z "$INDICES" ]; then
                    echo "No indices found or Elasticsearch unreachable"
                    exit 0
                  fi

                  # Calculate cutoff date
                  CUTOFF=$(date -u -d "-${RETENTION_DAYS} days" +%Y.%m.%d 2>/dev/null || date -u -v-${RETENTION_DAYS}d +%Y.%m.%d)
                  echo "Cutoff date: k8s-logs-${CUTOFF}"

                  echo "$INDICES" | while read -r line; do
                    INDEX=$(echo "$line" | awk '{print $1}')
                    # Extract date from index name: k8s-logs-YYYY.MM.DD
                    INDEX_DATE=$(echo "$INDEX" | sed 's/k8s-logs-//')
                    if [ "$INDEX_DATE" \< "$CUTOFF" ]; then
                      echo "Deleting old index: $INDEX (date=$INDEX_DATE < cutoff=$CUTOFF)"
                      curl -s -X DELETE "${ES_URL}/${INDEX}"
                      echo ""
                    fi
                  done
                  echo "Retention cleanup complete"
