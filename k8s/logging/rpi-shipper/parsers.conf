# UniFi controller log4j format:
#   [2026-04-26 16:23:01,234] <ThreadName> INFO  com.foo.Bar - message
[PARSER]
    Name        unifi-log4j
    Format      regex
    Regex       ^\[(?<time>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3})\] <(?<thread>[^>]*)>\s+(?<level>[A-Z]+)\s+(?<logger>\S+)\s+-\s+(?<message>.*)$
    Time_Key    time
    Time_Format %Y-%m-%d %H:%M:%S,%L
    Time_Keep   On

# Docker JSON log driver — used for any container's stdout/stderr file
[PARSER]
    Name        docker
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    Time_Keep   On
