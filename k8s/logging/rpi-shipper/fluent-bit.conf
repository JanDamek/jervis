[SERVICE]
    Flush         5
    Log_Level     info
    Daemon        off
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

# Controller application log (Java/log4j) — multiline-aware for stack traces
[INPUT]
    Name              tail
    Tag               unifi.controller.server
    Path              /unifi-logs/server.log
    Path_Key          path
    DB                /var/log/flb_server.db
    Multiline         On
    Parser_Firstline  unifi-log4j
    Mem_Buf_Limit     10MB
    Refresh_Interval  5

# Embedded MongoDB
[INPUT]
    Name              tail
    Tag               unifi.controller.mongo
    Path              /unifi-logs/mongod.log
    Path_Key          path
    DB                /var/log/flb_mongo.db
    Mem_Buf_Limit     10MB
    Refresh_Interval  5

# Controller HTTP/access log (also picks up tasks.log)
[INPUT]
    Name              tail
    Tag               unifi.controller.access
    Path              /unifi-logs/access.log,/unifi-logs/tasks.log
    Path_Key          path
    DB                /var/log/flb_access.db
    Mem_Buf_Limit     10MB
    Refresh_Interval  5

# Catch any other small logs (startup, migration, hotspot, sdwan...)
[INPUT]
    Name              tail
    Tag               unifi.controller.misc
    Path              /unifi-logs/*.log
    Exclude_Path      /unifi-logs/server.log,/unifi-logs/mongod.log,/unifi-logs/access.log,/unifi-logs/tasks.log
    Path_Key          path
    DB                /var/log/flb_misc.db
    Mem_Buf_Limit     5MB
    Refresh_Interval  10

[FILTER]
    Name   modify
    Match  unifi.controller.*
    Add    host unifi-controller-rpi

[OUTPUT]
    Name          forward
    Match         unifi.controller.*
    Host          ${AGGREGATOR_HOST}
    Port          ${AGGREGATOR_PORT}
    Retry_Limit   False
    Net.connect_timeout  10
