# =============================================================================
# Jervis O365 Browser Pool – K8s StatefulSet
#
# Stateful service. Manages Playwright browser instances for extracting
# O365 Bearer tokens from live web sessions. One context per client.
# Includes Xvfb + noVNC for interactive login via browser.
# =============================================================================

# ===== StatefulSet =====
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: jervis-o365-browser-pool
  namespace: jervis
spec:
  serviceName: jervis-o365-browser-pool
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: jervis-o365-browser-pool
  template:
    metadata:
      labels:
        app: jervis-o365-browser-pool
    spec:
      containers:
        - name: browser-pool
          image: registry.damek-soft.eu/jandamek/jervis-o365-browser-pool:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
              name: api
            - containerPort: 6080
              name: novnc
          volumeMounts:
            - name: browser-profiles
              mountPath: /browser-profiles
          envFrom:
            - configMapRef:
                name: jervis-config
          env:
            # Secret — not in ConfigMap
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jervis-secrets
                  key: MONGODB_PASSWORD
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "8Gi"
              cpu: "4000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8090
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: browser-profiles
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
# ===== Service =====
apiVersion: v1
kind: Service
metadata:
  name: jervis-o365-browser-pool
  namespace: jervis
spec:
  selector:
    app: jervis-o365-browser-pool
  ports:
    - name: api
      port: 8090
      targetPort: 8090
    - name: novnc
      port: 6080
      targetPort: 6080
