# =============================================================================
# Jervis O365 Browser Pool – K8s StatefulSet
#
# One pod per O365/Teams connection. Each pod runs its own Playwright browser
# instance with isolated profile, PulseAudio for meeting recording, and noVNC.
#
# Pods are individually addressable:
#   jervis-o365-browser-pool-0.jervis-o365-browser-pool.jervis.svc.cluster.local
#   jervis-o365-browser-pool-1.jervis-o365-browser-pool.jervis.svc.cluster.local
#   jervis-o365-browser-pool-2.jervis-o365-browser-pool.jervis.svc.cluster.local
#
# Server assigns connections to pods via /session/{connectionId}/init with
# pod ordinal mapping. Each pod handles exactly one connection — crash of
# one pod does not affect others.
# =============================================================================

# ===== StatefulSet =====
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: jervis-o365-browser-pool
  namespace: jervis
spec:
  serviceName: jervis-o365-browser-pool
  replicas: 3
  revisionHistoryLimit: 2
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: jervis-o365-browser-pool
  template:
    metadata:
      labels:
        app: jervis-o365-browser-pool
    spec:
      containers:
        - name: browser-pool
          image: registry.damek-soft.eu/jandamek/jervis-o365-browser-pool:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
              name: api
            - containerPort: 6080
              name: novnc
          volumeMounts:
            - name: browser-profiles
              mountPath: /browser-profiles
          envFrom:
            - configMapRef:
                name: jervis-config
          env:
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jervis-secrets
                  key: MONGODB_PASSWORD
            # Pod identity — used by server for connection→pod mapping
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_ORDINAL
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "8Gi"
              cpu: "4000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8090
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: browser-profiles
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
# ===== Headless Service (required for StatefulSet individual pod DNS) =====
apiVersion: v1
kind: Service
metadata:
  name: jervis-o365-browser-pool
  namespace: jervis
spec:
  clusterIP: None
  selector:
    app: jervis-o365-browser-pool
  ports:
    - name: api
      port: 8090
      targetPort: 8090
    - name: novnc
      port: 6080
      targetPort: 6080
---
# ===== ClusterIP Service (for ingress VNC access — routes to pod-0 by default) =====
apiVersion: v1
kind: Service
metadata:
  name: jervis-o365-browser-pool-lb
  namespace: jervis
spec:
  selector:
    app: jervis-o365-browser-pool
  ports:
    - name: api
      port: 8090
      targetPort: 8090
    - name: novnc
      port: 6080
      targetPort: 6080
