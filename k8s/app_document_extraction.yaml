apiVersion: apps/v1
kind: Deployment
metadata:
  name: jervis-document-extraction
  namespace: jervis
spec:
  revisionHistoryLimit: 2
  replicas: 1
  selector:
    matchLabels:
      app: jervis-document-extraction
  template:
    metadata:
      labels:
        app: jervis-document-extraction
    spec:
      securityContext:
        runAsUser: 1110
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: document-extraction
          image: registry.damek-soft.eu/jandamek/jervis-document-extraction:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 5501
              name: grpc
          env:
            - name: OLLAMA_ROUTER_URL
              value: "http://jervis-ollama-router:8080"
            - name: DOCEXT_GRPC_PORT
              value: "5501"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
      imagePullSecrets:
        - name: regcred
---
apiVersion: v1
kind: Service
metadata:
  name: jervis-document-extraction
  namespace: jervis
spec:
  selector:
    app: jervis-document-extraction
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: grpc
      port: 5501
      targetPort: 5501
  type: ClusterIP
