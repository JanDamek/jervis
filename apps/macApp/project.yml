name: JervisAPNs

options:
  bundleIdPrefix: com.jervis
  developmentLanguage: cs
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: GR74KSG8M9
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    ENABLE_HARDENED_RUNTIME: YES

targets:
  JervisAPNs:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: macApp
        excludes:
          - "Info.plist"
          - "macApp.entitlements"
          - "Resources/**"
    info:
      path: macApp/Info.plist
      properties:
        CFBundleDisplayName: Jervis APNs Helper
        LSMinimumSystemVersion: "13.0"
        LSUIElement: true
        NSApplicationBackgroundModes:
          - remote-notification
    entitlements:
      path: macApp/macApp.entitlements
      properties:
        com.apple.developer.aps-environment: production
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jervis.macApp
        PRODUCT_NAME: JervisAPNs
        INFOPLIST_FILE: macApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: macApp/macApp.entitlements
        GENERATE_INFOPLIST_FILE: NO
    dependencies: []

schemes:
  JervisAPNs:
    build:
      targets:
        JervisAPNs: all
    run:
      config: Debug
      executable: JervisAPNs
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
