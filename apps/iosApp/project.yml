name: iosApp

options:
  bundleIdPrefix: com.jervis
  developmentLanguage: cs
  deploymentTarget:
    iOS: "15.0"
    watchOS: "9.0"
  createIntermediateGroups: true
  disabledAutogeneratedSchemes: true
  generateGroupsRecurseively: true

settings:
  base:
    DEVELOPMENT_TEAM: GR74KSG8M9
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"

targets:
  iosApp:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: iosApp
        excludes:
          - "Info.plist"
          - "iosApp.entitlements"
    entitlements:
      path: iosApp/iosApp.entitlements
      properties:
        aps-environment: development
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jervis
        PRODUCT_NAME: iosApp
        INFOPLIST_FILE: iosApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: iosApp/iosApp.entitlements
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        FRAMEWORK_SEARCH_PATHS: $(inherited) "${BUILT_PRODUCTS_DIR}"
        OTHER_LDFLAGS: $(inherited) -framework JervisShared
        INFOPLIST_KEY_CFBundleDisplayName: Jervis
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    dependencies:
      - target: JervisWatch
        embed: true
        codeSign: true
    preBuildScripts:
      - name: Compile Kotlin Multiplatform
        script: |
          if [ "YES" = "$OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED" ]; then
            echo "Skipping Gradle build task invocation due to OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED environment variable set to \"YES\""
            exit 0
          fi
          cd "$SRCROOT/../.."
          ./gradlew :shared:ui-common:embedAndSignAppleFrameworkForXcode
        outputs:
          - $(BUILT_PRODUCTS_DIR)/JervisShared.framework

  JervisWatch:
    type: application
    platform: watchOS
    deploymentTarget: "9.0"
    sources:
      - path: JervisWatch
        excludes:
          - "Info.plist"
          - "JervisWatch.entitlements"
    entitlements:
      path: JervisWatch/JervisWatch.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jervis.watchkitapp
        PRODUCT_NAME: JervisWatch
        INFOPLIST_FILE: JervisWatch/Info.plist
        CODE_SIGN_ENTITLEMENTS: JervisWatch/JervisWatch.entitlements
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "4"
        INFOPLIST_KEY_CFBundleDisplayName: Jervis
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.jervis
        INFOPLIST_KEY_WKRunsIndependentlyOfCompanionApp: YES
    dependencies:
      - target: JervisComplication
        embed: true
        codeSign: true

  JervisComplication:
    type: app-extension
    platform: watchOS
    deploymentTarget: "9.0"
    sources:
      - path: JervisComplication
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jervis.watchkitapp.complication
        PRODUCT_NAME: JervisComplication
        INFOPLIST_FILE: JervisComplication/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "4"

schemes:
  "iOS App":
    build:
      targets:
        iosApp: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
