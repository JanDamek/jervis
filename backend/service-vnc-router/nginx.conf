worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # Lua needs access to DNS for dynamic upstream resolution
    resolver kube-dns.kube-system.svc.cluster.local valid=10s ipv6=off;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr conn_id=$conn_id';

    access_log /dev/stdout main;
    error_log /dev/stderr warn;

    # Keep connections alive for noVNC WebSocket sessions
    keepalive_timeout 3600s;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 8080;

        # Health check for the router itself
        location = /health {
            return 200 '{"status":"UP"}';
            add_header Content-Type application/json;
        }

        # All VNC traffic — route based on connectionId from token or cookie
        location / {
            set $conn_id '';
            set $backend '';

            # Extract connectionId from token query param (first request)
            # or from vnc_session cookie (subsequent requests)
            # Token format: {connectionId}_{randomHex}
            # Cookie format: {connectionId}_{sessionId}
            rewrite_by_lua_block {
                local conn_id = nil

                -- 1. Try token from query string (first VNC access)
                local token = ngx.var.arg_token
                if token and token ~= "" then
                    -- connectionId is everything before the first underscore
                    conn_id = token:match("^([^_]+)_")
                end

                -- 2. Fallback to vnc_session cookie (subsequent requests)
                if not conn_id then
                    local cookie = ngx.var.cookie_vnc_session
                    if cookie and cookie ~= "" then
                        conn_id = cookie:match("^([^_]+)_")
                    end
                end

                if not conn_id or conn_id == "" then
                    ngx.status = 404
                    ngx.say("No connection ID found in token or cookie")
                    return ngx.exit(404)
                end

                ngx.var.conn_id = conn_id
                ngx.var.backend = "jervis-browser-" .. conn_id .. ".jervis.svc.cluster.local:8090"
            }

            # Proxy to the resolved browser pod
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (noVNC)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Long timeouts for VNC sessions
            proxy_connect_timeout 10s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
