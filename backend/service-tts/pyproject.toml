[project]
name = "jervis-tts"
version = "0.1.0"
description = "Jervis TTS service — piper-tts synthesis. (Stays Python — ML framework binding)"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.6",
    "uvicorn[standard]>=0.34.0",
    "piper-tts==1.2.0",
    "pydantic>=2.0",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["app*"]
